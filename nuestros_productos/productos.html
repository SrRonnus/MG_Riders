<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Catálogo de repuestos de moto | MG Riders - Quito, Ecuador</title>
        <meta name="description" content="Catálogo de repuestos de moto MG Riders. Repuestos para Pulsar, CG, Tundra, GN, Suzuki y más. Tienda en Quito, envíos a todo Ecuador.">
        <meta name="keywords" content="catálogo repuestos moto, repuestos motos Ecuador, MG Riders, repuestos Pulsar, repuestos CG, repuestos Tundra, Quito">
        <meta name="robots" content="index, follow">
        <meta property="og:title" content="Catálogo de repuestos de moto | MG Riders Ecuador">
        <meta property="og:description" content="Repuestos de moto en Quito. Catálogo completo con envíos a todo Ecuador.">
        <meta property="og:url" content="https://srronnus.github.io/MG_Riders/nuestros_productos/productos.html">
        <meta property="og:type" content="website">
        <link rel="canonical" href="https://srronnus.github.io/MG_Riders/nuestros_productos/productos.html">
        <link rel="stylesheet" href="../general.css" />
        <link rel="stylesheet" href="productos.css" />
        <link rel="icon" type="image/x-icon" href="../images/Logo-MGRaiders.png">
    </head>

    <body>
        <header class="catalog-header">
            <a class="back" href="../index.html">&larr; Volver</a>
            <h1>Catálogo MG Riders</h1>
        </header>

        <main class="catalog-main">
            <section class="controls">
                <input
                    id="search"
                    type="search"
                    placeholder="Buscar producto, referencia o precio..."
                    aria-label="Buscar productos"
                />

                <select id="sort">
                    <option value="default">Orden: Relevancia</option>
                    <option value="price-asc">Precio: menor a mayor</option>
                    <option value="price-desc">Precio: mayor a menor</option>
                </select>
            </section>

            <section id="catalog" class="catalog-grid" aria-live="polite">
                <!-- Productos se cargarán dinámicamente -->
            </section>
        </main>

        <template id="card-template">
            <article class="card">
                <div class="img-wrap">
                    <img loading="lazy" alt="Producto" />
                </div>

                <div class="card-body">
                    <h3 class="card-title"></h3>
                    <p class="card-desc"></p>

                    <div class="card-meta">
                        <span class="price"></span>
                        <a class="ver-btn" target="_blank" rel="noopener">Ver</a>
                    </div>
                </div>
            </article>
        </template>

        <script src="productos.js" defer></script>
    </body>
</html>
