<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contacto | MG Riders - Repuestos de Moto Quito, Ecuador</title>
    <meta name="description" content="Contacta a MG Riders. Tienda de repuestos de moto en Quito. WhatsApp, correo y formulario. Respuesta rápida.">
    <meta name="keywords" content="contacto MG Riders, repuestos motos Quito, WhatsApp repuestos moto Ecuador">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="Contacto | MG Riders - Quito, Ecuador">
    <meta property="og:description" content="Contacta a MG Riders para repuestos de moto en Quito y Ecuador.">
    <meta property="og:url" content="https://srronnus.github.io/MG_Riders/contactos/contactos.html">
    <meta property="og:type" content="website">
    <link rel="canonical" href="https://srronnus.github.io/MG_Riders/contactos/contactos.html">
    <link rel="stylesheet" href="../general.css" />
    <link rel="stylesheet" href="contactos.css" />
    <link rel="icon" type="image/x-icon" href="../images/Logo-MGRaiders.png">
  </head>
  <body>
    <header class="header">
      <a href="../index.html" class="volver">Volver</a>
      <h3>MG Riders | Contactos</h3>
    </header>
    <hr>
    <!--EmailJS SDK-->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

    <section class="container">
      <div class="text-section">
        <h2>Póngase en contacto</h2>
        <p>
          Complete el formulario y recibirá respuesta a su correo lo antes
          posible.
        </p>
      </div>

      <form id="contactForm">
        <label for="nombre">Nombre</label>
        <input type="text" name="nombre" placeholder="Ej: Juan Pérez" required />
        <label for="email">Correo electrónico</label>
        <input
          type="email"
          name="email"
          placeholder="example@gmail.com"
          required
        />
        <label for="mensaje">Mensaje</label>
        <textarea
          name="mensaje"
          placeholder="Escribe tu mensaje aquí..."
          rows="5"
          required
        ></textarea>
        <button type="submit">ENVIAR</button>
      </form>
    </section>

    

    <script src="contactos.js"></script>
  </body>
</html>
